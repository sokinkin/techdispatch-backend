spring.application.name=my-springboot-platform

spring.datasource.url=jdbc:mysql://localhost/techdispatch
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/api
springdoc.swagger-ui.path=/api-ui

# --- Auth / JWT ---
# HS256 needs a key of at least 32 bytes. For a real deployment move this to an
# environment variable; it is inlined here to keep the learning project simple.
app.jwt.secret=techdispatch-super-secret-key-change-me-please-0123456789
app.jwt.expiration-ms=86400000

# Default password given to seeded logins for customers/technicians that existed
# before auth (see DataSeeder).
app.seed.default-password=password123
